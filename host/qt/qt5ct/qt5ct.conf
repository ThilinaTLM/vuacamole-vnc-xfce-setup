[Appearance]
# Qt 5 app theming for the headless Sway remote desktop (via QT_QPA_PLATFORMTHEME=qt5ct).
# Installed to ~/.config/qt5ct/qt5ct.conf by host/install-host.sh.
# Fusion + Catppuccin Mocha palette. The installer rewrites @QT5CT_COLORS@.
custom_palette=true
color_scheme_path=@QT5CT_COLORS@
icon_theme=Papirus-Dark
standard_dialogs=default
style=Fusion

[Fonts]
fixed="IosevkaTerm Nerd Font,11,-1,5,50,0,0,0,0,0"
general="IosevkaTerm Nerd Font,11,-1,5,50,0,0,0,0,0"
