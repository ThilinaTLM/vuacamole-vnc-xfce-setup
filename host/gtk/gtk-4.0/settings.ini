[Settings]
# GTK 4 / libadwaita app theming for the headless Sway remote desktop.
# Installed to ~/.config/gtk-4.0/settings.ini by host/install-host.sh.
# See host/gtk/gtk-3.0/settings.ini for rationale (dark + no animations).
gtk-theme-name=Adwaita-dark
gtk-icon-theme-name=Papirus-Dark
gtk-cursor-theme-name=Adwaita
gtk-cursor-theme-size=24
gtk-font-name=IosevkaTerm Nerd Font 11
gtk-application-prefer-dark-theme=1
gtk-enable-animations=0
gtk-xft-antialias=1
gtk-xft-hinting=1
gtk-xft-hintstyle=hintslight
gtk-xft-rgba=rgb
