[Settings]
# GTK 3 app theming for the headless Sway remote desktop.
# Installed to ~/.config/gtk-3.0/settings.ini by host/install-host.sh.
#
# Dark Adwaita base + Catppuccin accents (see gtk.css). gtk-enable-animations=0
# keeps GTK apps instant AND makes Firefox/Chromium report
# prefers-reduced-motion: reduce (they read this GTK flag) — which suits the
# software-rendered VNC stream (fewer repaints).
gtk-theme-name=Adwaita-dark
gtk-icon-theme-name=Papirus-Dark
gtk-cursor-theme-name=Adwaita
gtk-cursor-theme-size=24
gtk-font-name=IosevkaTerm Nerd Font 11
gtk-application-prefer-dark-theme=1
gtk-enable-animations=0
gtk-xft-antialias=1
gtk-xft-hinting=1
gtk-xft-hintstyle=hintslight
gtk-xft-rgba=rgb
