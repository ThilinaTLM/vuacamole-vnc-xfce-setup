# Session environment for the headless Sway remote desktop.
# Installed to ~/.config/environment.d/desktop.conf by host/install-host.sh.
# Read by the user systemd manager and inherited by the Sway session + its apps.

# Route Qt apps through qt6ct (Fusion + Catppuccin Mocha palette).
QT_QPA_PLATFORMTHEME=qt6ct
# Qt 5 apps honour the same variable; qt5ct config mirrors qt6ct.

# Identify the desktop so xdg-desktop-portal picks sane backends.
XDG_CURRENT_DESKTOP=sway
XDG_SESSION_DESKTOP=sway

# Dark GTK theme for apps that read the env instead of settings.ini.
GTK_THEME=Adwaita-dark

# Cursor theme/size for Wayland + XWayland clients.
XCURSOR_THEME=Adwaita
XCURSOR_SIZE=24

# Native Wayland for Firefox (avoids the XWayland blur; fine over VNC).
MOZ_ENABLE_WAYLAND=1
