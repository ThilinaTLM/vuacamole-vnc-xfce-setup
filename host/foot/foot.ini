# foot terminal — Catppuccin Mocha.
# Installed to ~/.config/foot/foot.ini by host/install-host.sh.

font=IosevkaTerm Nerd Font:size=11
pad=12x12
# No transparency/blur (software renderer + VNC): keep it opaque and crisp.

[cursor]
style=beam

[colors]
alpha=1.0
background=1e1e2e
foreground=cdd6f4

# Catppuccin Mocha 16-color palette
regular0=45475a
regular1=f38ba8
regular2=a6e3a1
regular3=f9e2af
regular4=89b4fa
regular5=f5c2e7
regular6=94e2d5
regular7=bac2de

bright0=585b70
bright1=f38ba8
bright2=a6e3a1
bright3=f9e2af
bright4=89b4fa
bright5=f5c2e7
bright6=94e2d5
bright7=a6adc8

selection-foreground=cdd6f4
selection-background=414356
